version: "3.8"

services:
  dashboard:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"   # Frontend
      - "3001:3001"   # Backend API
    environment:
      - DB_HOST=host.gateway.docker.internal  # Access host MySQL from container
      - DB_PORT=59972
      - DB_USER=root
      - DB_PASSWORD=secret
      - DB_NAME=BalerDB
      - API_PORT=3001
    extra_hosts:
      - "host.gateway.docker.internal:host-gateway"
    restart: unless-stopped
